name: CI and GHCR Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v --tb=short

  build-test-image:
    name: Build Docker Image (No Push)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'release'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local test image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: kiro-gateway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          # 中文注释：只做最小可用性检查，避免引入额外外部依赖
          docker run -d \
            --name kiro-gateway-test \
            -p 8000:8000 \
            -e PROXY_API_KEY="test-key-123" \
            -e REFRESH_TOKEN="test-token" \
            kiro-gateway:test
          sleep 10
          curl -f http://localhost:8000/health
          docker stop kiro-gateway-test
          docker rm kiro-gateway-test

  release-ghcr:
    name: Build and Push to GHCR (Release)
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 中文注释：发布页 tag 作为主版本标签
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest
            type=sha,prefix=release-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
