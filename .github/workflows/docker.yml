name: CI and GHCR Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v --tb=short

      - name: Generate coverage report
        if: success()
        run: |
          pip install pytest-cov
          pytest --cov=kiro --cov-report=xml --cov-report=term

      - name: Upload coverage to artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-test-image:
    name: Build Docker Image (No Push)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'release'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean up runtime artifacts
        run: |
          rm -f credentials.json state.json
          echo "已清理运行时凭据文件"

      - name: Build local test image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: kiro-gateway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kiro-gateway:test
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: docker-image

      - name: Test Docker image
        run: |
          # 校验镜像结构和非 root 用户写权限。
          docker run --rm kiro-gateway:test sh -c "
            test -f /app/main.py && \
            test -d /app/kiro && \
            test -w /app && \
            touch /app/test.tmp && rm /app/test.tmp
          "

          # 校验上游新增模块与服务依赖可以导入。
          docker run --rm kiro-gateway:test python -c "
          import kiro
          import kiro.auth
          import kiro.account_manager
          import kiro.config
          import kiro.routes_openai
          import kiro.routes_anthropic
          import fastapi
          import httpx
          import loguru
          import uvicorn
          "

          docker run --rm kiro-gateway:test python main.py --version

  release-ghcr:
    name: Build and Push to GHCR (Release)
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean up runtime artifacts
        run: |
          rm -f credentials.json state.json
          echo "已清理运行时凭据文件"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 发布页 tag 作为主版本标签。
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest
            type=sha,prefix=release-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
